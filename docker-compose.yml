services:
  # ==========================================
  # EXISTING SERVICES (YOUR PRODUCTION APP)
  # ==========================================
  
  db:
    image: postgres:15
    container_name: jobboard-db
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobsdb
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - jobboard-network

  api:
    build: ./backend
    container_name: jobboard-api
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped
    networks:
      - jobboard-network

  # ==========================================
  # NEW: AIRFLOW SERVICES (FOR DE PORTFOLIO)
  # ==========================================
  
  # Airflow needs its own PostgreSQL for metadata
  airflow-postgres:
    image: postgres:15
    container_name: jobboard-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jobboard-network

  # Airflow init (runs once to setup DB)
  airflow-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.airflow
    container_name: jobboard-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./backend/dags:/opt/airflow/dags
      - ./backend/logs:/opt/airflow/logs
      - ./backend/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        echo "✅ Airflow initialized!"
    networks:
      - jobboard-network

  # Airflow webserver (UI)
  airflow-webserver:
    build:
      context: ./backend
      dockerfile: Dockerfile.airflow
    container_name: jobboard-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'myjobphase-secret-key-2026'
    # env_file:
    #   - ./backend/.env
    volumes:
      - ./backend/dags:/opt/airflow/dags
      - ./backend/logs:/opt/airflow/logs
      - ./backend/plugins:/opt/airflow/plugins
      - ./backend/app:/opt/airflow/app  # Your code
      - ./backend/data:/opt/airflow/data  # Bronze/Silver/Gold
      # - ./backend/.env:/opt/airflow/.env  # Environment vars
      # - ./backend/run_ingest.py:/opt/airflow/run_ingest.py
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - jobboard-network

  # Airflow scheduler (runs DAGs)
  airflow-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.airflow
    container_name: jobboard-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'myjobphase-secret-key-2026'
    # env_file:
    #   - ./backend/.env
    volumes:
      - ./backend/dags:/opt/airflow/dags
      - ./backend/logs:/opt/airflow/logs
      - ./backend/plugins:/opt/airflow/plugins
      - ./backend/app:/opt/airflow/app
      - ./backend/data:/opt/airflow/data
      # - ./backend/.env:/opt/airflow/.env
      # - ./backend/run_ingest.py:/opt/airflow/run_ingest.py
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - jobboard-network

volumes:
  dbdata:
    driver: local
  airflow-db-volume:  # ⭐ NEW: Airflow metadata storage
    driver: local

networks:
  jobboard-network:
    driver: bridge