services:
  db:
    image: postgres:15
    container_name: jobboard-db
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobsdb
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped  # Auto-restart if crashes
    networks:
      - jobboard-network

  api:
    build: ./backend
    container_name: jobboard-api
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be ready
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app  # Hot-reload during development
    restart: unless-stopped
    networks:
      - jobboard-network

volumes:
  dbdata:
    driver: local

networks:
  jobboard-network:
    driver: bridge